services:
  ws-server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: dev
    image: syncpad/ws-server:dev
    container_name: syncpad-ws-server-dev
    env_file:
      - ./server/.env
    environment:
      PORT: "8080"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./server:/app
      - ws_server_node_modules:/app/node_modules
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: syncpad-redis-dev
    ports:
      - "6379:6379"
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: dev
    image: syncpad/client:dev
    container_name: syncpad-client-dev
    depends_on:
      - ws-server
      - redis
    env_file:
      - ./client/.env
    environment:
      NODE_ENV: development
      PORT: "3000"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
      - client_next_cache:/app/.next
    restart: unless-stopped

volumes:
  ws_server_node_modules:
  client_node_modules:
  client_next_cache:
